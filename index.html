<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>云剪贴板</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js">
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 16px;
            padding-bottom: calc(40px + env(safe-area-inset-bottom));
            -webkit-tap-highlight-color: transparent;
        }
        h1 { font-size: 22px; color: #333; margin-bottom: 6px; font-weight: 600; }
        .subtitle { font-size: 13px; color: #999; margin-bottom: 6px; }
        .sync-status {
            font-size: 12px; color: #34c759; margin-bottom: 20px;
            display: flex; align-items: center; gap: 4px;
        }
        .sync-status.offline { color: #e74c3c; }

        /* ---- 分类标题 ---- */
        .group-header {
            width: 100%; max-width: 600px;
            font-size: 14px; font-weight: 600;
            color: #888; margin: 16px 0 8px 4px;
            display: flex; align-items: center; gap: 6px;
        }
        .group-header:first-of-type { margin-top: 0; }

        .copy-box {
            width: 100%; max-width: 600px; background: #fff;
            border-radius: 14px; padding: 18px 20px; margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px; cursor: pointer;
            transition: box-shadow 0.2s, transform 0.15s, background 0.2s, opacity 0.15s;
            user-select: none; -webkit-touch-callout: none;
            touch-action: manipulation;
        }
        .copy-box:active { transform: scale(0.98); background: #f0f4ff; }
        .copy-box .text {
            flex: 1; font-size: 16px; color: #222;
            word-break: break-all; line-height: 1.5;
        }
        .copy-box .badge {
            flex-shrink: 0; font-size: 13px; color: #fff;
            background: #4f8cf7; border-radius: 8px; padding: 6px 16px;
            transition: background 0.2s; font-weight: 500; min-width: 56px; text-align: center;
        }
        .copy-box.copied { background: #f0fff4; }
        .copy-box.copied .badge { background: #34c759; }

        .toast {
            position: fixed; bottom: calc(40px + env(safe-area-inset-bottom));
            left: 50%; transform: translateX(-50%) translateY(20px);
            background: rgba(0,0,0,0.78); color: #fff; font-size: 14px;
            padding: 12px 24px; border-radius: 10px; opacity: 0;
            pointer-events: none; transition: opacity 0.3s, transform 0.3s;
            white-space: nowrap; max-width: 90vw; overflow: hidden;
            text-overflow: ellipsis; z-index: 100;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ---- 添加区域 ---- */
        .add-area {
            margin-top: 8px;
            width: 100%; max-width: 600px;
            position: sticky; bottom: calc(env(safe-area-inset-bottom));
            padding-bottom: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .add-row {
            display: flex; gap: 8px;
        }
        .add-row input {
            flex: 1; padding: 14px 16px; border: 1.5px solid #ddd;
            border-radius: 10px; font-size: 16px; outline: none;
            background: #fff; transition: border-color 0.2s;
        }
        .add-row input:focus { border-color: #4f8cf7; }
        .add-row button {
            padding: 14px 24px; border: none; border-radius: 10px;
            background: #4f8cf7; color: #fff; font-size: 16px;
            font-weight: 500; cursor: pointer; transition: background 0.2s;
            -webkit-touch-callout: none;
            white-space: nowrap;
        }
        .add-row button:active { background: #3a7be5; }
        .cat-input {
            padding: 10px 14px; border: 1.5px solid #ddd;
            border-radius: 10px; font-size: 14px; outline: none;
            background: #fff; transition: border-color 0.2s;
            width: 100%;
        }
        .cat-input:focus { border-color: #4f8cf7; }
        .cat-input::placeholder { color: #bbb; }

        .empty-tip { color: #bbb; font-size: 14px; margin-top: 40px; }

        /* ---- 删除确认弹窗 ---- */
        .modal-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 200;
            align-items: center; justify-content: center;
            padding: 32px;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: #fff; border-radius: 16px;
            padding: 28px 24px 20px;
            width: 100%; max-width: 300px;
            text-align: center;
        }
        .modal-box p {
            font-size: 16px; color: #333;
            margin-bottom: 24px; line-height: 1.5;
        }
        .modal-box .modal-text-preview {
            font-size: 14px; color: #666;
            background: #f5f5f5; border-radius: 8px;
            padding: 10px 14px; margin-bottom: 20px;
            word-break: break-all; text-align: left;
            max-height: 80px; overflow-y: auto;
        }
        .modal-btns {
            display: flex; gap: 12px;
        }
        .modal-btns button {
            flex: 1; padding: 12px 0; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 500; cursor: pointer;
            transition: opacity 0.2s;
        }
        .modal-btns button:active { opacity: 0.7; }
        .btn-cancel { background: #f0f0f0; color: #666; }
        .btn-confirm { background: #e74c3c; color: #fff; }
    </style>
</head>
<body>

    <h1>📋 云剪贴板</h1>
    <p class="subtitle">点击复制 · 长按删除 · 多设备同步</p>
    <div class="sync-status" id="syncStatus">🟢 已连接</div>

    <div id="list"></div>
    <p class="empty-tip" id="emptyTip">还没有内容，在下方添加</p>

    <div class="add-area">
        <div class="add-row">
            <input id="newInput" placeholder="输入要添加的文本…" />
            <button onclick="addItem()">添加</button>
        </div>
        <input class="cat-input" id="catInput" placeholder="分组（留空则归为"通用"）" />
    </div>

    <div class="toast" id="toast"></div>

    <!-- 删除确认弹窗 -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-box">
            <p>确认删除？</p>
            <div class="modal-text-preview" id="deletePreview"></div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeDeleteModal()">取消</button>
                <button class="btn-confirm" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>

    <script>
        // ============ Firebase 配置 ============
        const firebaseConfig = {
            apiKey: "AIzaSyAP9lpzll2dwrb8lP-QDG6HtzIUmqht11g",
            authDomain: "copy-3c2be.firebaseapp.com",
            databaseURL: "https://copy-3c2be-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "copy-3c2be",
            storageBucket: "copy-3c2be.firebasestorage.app",
            messagingSenderId: "650077116381",
            appId: "1:650077116381:web:1b6cf9cfe41235483f8834",
            measurementId: "G-J574GLH0WC"
        };
        // ======================================

        // ---- 工具：颜色生成 ----
        const COLORS = ['#4f8cf7','#34c759','#ff9500','#af52de','#ff3b30','#00c7be','#ff6482','#5856d6'];

        // ---- 初始化 Firebase ----
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const itemsRef = db.ref('items');

        let items = [];
        let pendingDeleteId = null;

        // ---- 实时监听云端数据变化 ----
        itemsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                items = Object.entries(data).map(([id, val]) => {
                    if (typeof val === 'string') {
                        return { id, text: val, category: '通用' };
                    }
                    return { id, text: val.text || '', category: val.category || '通用' };
                });
            } else {
                items = [];
            }
            render();
            updateSyncStatus(true);
        }, (error) => {
            updateSyncStatus(false);
        });

        function updateSyncStatus(online) {
            const el = document.getElementById('syncStatus');
            el.textContent = online ? '🟢 已连接 · 实时同步中' : '🔴 连接断开，请检查网络';
            el.className = 'sync-status' + (online ? '' : ' offline');
        }

        // ---- 获取分类颜色 ----
        function getCatColor(cat) {
            let hash = 0;
            for (let i = 0; i < cat.length; i++) hash = ((hash << 5) - hash) + cat.charCodeAt(i);
            return COLORS[Math.abs(hash) % COLORS.length];
        }

        // ---- 渲染 ----
        function render() {
            const listEl = document.getElementById('list');
            const emptyTip = document.getElementById('emptyTip');

            if (items.length === 0) {
                listEl.innerHTML = '';
                emptyTip.style.display = 'block';
                return;
            }
            emptyTip.style.display = 'none';

            // 按分类分组
            const grouped = {};
            const catOrder = [];
            items.forEach(item => {
                const cat = item.category || '通用';
                if (!grouped[cat]) {
                    grouped[cat] = [];
                    catOrder.push(cat);
                }
                grouped[cat].push(item);
            });

            let html = '';
            catOrder.forEach(cat => {
                const color = getCatColor(cat);
                html += `<div class="group-header">
                    <span style="color:${color}">●</span> ${cat} <span style="color:#ccc;font-weight:400;font-size:12px">${grouped[cat].length}</span>
                </div>`;
                grouped[cat].forEach(item => {
                    html += `
                        <div class="copy-box" data-id="${item.id}">
                            <span class="text">${escapeHtml(item.text)}</span>
                            <span class="badge" onclick="event.stopPropagation();copyItem('${item.id}')">复制</span>
                        </div>
                    `;
                });
            });

            listEl.innerHTML = html;

            // 点击卡片复制 + 长按删除
            listEl.querySelectorAll('.copy-box').forEach((box) => {
                let longPressTimer = null;
                let isLongPress = false;

                const startPress = (e) => {
                    isLongPress = false;
                    longPressTimer = setTimeout(() => {
                        isLongPress = true;
                        // 触觉反馈（手机震动）
                        if (navigator.vibrate) navigator.vibrate(20);
                        showDeleteModal(box.dataset.id);
                    }, 600);
                };
                const endPress = () => {
                    if (longPressTimer) {
                        clearTimeout(longPressTimer);
                        longPressTimer = null;
                    }
                    if (!isLongPress) {
                        copyItem(box.dataset.id);
                    }
                };

                box.addEventListener('touchstart', startPress, { passive: true });
                box.addEventListener('touchend', endPress);
                box.addEventListener('touchmove', () => {
                    if (longPressTimer) {
                        clearTimeout(longPressTimer);
                        longPressTimer = null;
                    }
                });

                box.addEventListener('mousedown', startPress);
                box.addEventListener('mouseup', endPress);
                box.addEventListener('mouseleave', () => {
                    if (longPressTimer) {
                        clearTimeout(longPressTimer);
                        longPressTimer = null;
                    }
                });
            });
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // ---- 复制 ----
        function findItemById(id) {
            return items.find(i => i.id === id);
        }

        async function copyItem(id) {
            const item = findItemById(id);
            if (!item) return;
            const text = item.text;

            try { await navigator.clipboard.writeText(text); }
            catch {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
                document.body.appendChild(ta);
                ta.focus(); ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            }

            const box = document.querySelector(`.copy-box[data-id="${id}"]`);
            if (box) {
                box.classList.add('copied');
                const badge = box.querySelector('.badge');
                if (badge) badge.textContent = '已复制 ✓';
                setTimeout(() => {
                    box.classList.remove('copied');
                    if (badge) badge.textContent = '复制';
                }, 1200);
            }

            showToast(text.length > 28 ? text.slice(0, 28) + '…' : text);
        }

        // ---- 添加 ----
        function addItem() {
            const input = document.getElementById('newInput');
            const catInput = document.getElementById('catInput');
            const val = input.value.trim();
            const cat = catInput.value.trim() || '通用';
            if (!val) return;

            const obj = { text: val, category: cat };
            itemsRef.push(obj, (error) => {
                if (error) showToast('同步失败，请重试');
                else {
                    input.value = '';
                    catInput.value = '';
                }
            });
        }

        // ---- 删除（长按弹窗） ----
        function showDeleteModal(id) {
            pendingDeleteId = id;
            const item = findItemById(id);
            if (!item) return;
            document.getElementById('deletePreview').textContent = item.text;
            document.getElementById('deleteModal').classList.add('show');
        }

        function closeDeleteModal() {
            pendingDeleteId = null;
            document.getElementById('deleteModal').classList.remove('show');
        }

        function confirmDelete() {
            if (pendingDeleteId) {
                itemsRef.child(pendingDeleteId).remove();
                showToast('已删除');
            }
            closeDeleteModal();
        }

        // 点击遮罩层关闭弹窗
        document.getElementById('deleteModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeDeleteModal();
        });

        // ---- Toast ----
        let toastTimer = null;
        function showToast(msg) {
            const toastEl = document.getElementById('toast');
            if (toastTimer) clearTimeout(toastTimer);
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
        }

        // ---- 回车添加 ----
        document.getElementById('newInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addItem();
        });
        document.getElementById('catInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addItem();
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>云剪贴板</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js">
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 16px;
            padding-bottom: calc(40px + env(safe-area-inset-bottom));
            -webkit-tap-highlight-color: transparent;
        }

        /* ---- 标题区域（可长按） ---- */
        .header-area {
            text-align: center;
            touch-action: manipulation;
            user-select: none;
            -webkit-touch-callout: none;
            padding: 8px 16px;
            margin: -8px -16px 0;
            border-radius: 12px;
            transition: background 0.2s;
        }
        .header-area:active { background: #eee; }
        h1 { font-size: 22px; color: #333; font-weight: 600; }
        .subtitle { font-size: 13px; color: #999; margin-top: 4px; }
        .sync-status {
            font-size: 12px; color: #34c759; margin: 6px 0 20px;
            display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .sync-status.offline { color: #e74c3c; }

        /* ---- 分类标题 ---- */
        .group-header {
            width: 100%; max-width: 600px;
            font-size: 14px; font-weight: 600;
            color: #888; margin: 16px 0 8px 4px;
            display: flex; align-items: center; gap: 6px;
        }
        .group-header:first-of-type { margin-top: 0; }

        .copy-box {
            width: 100%; max-width: 600px; background: #fff;
            border-radius: 14px; padding: 18px 20px; margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px; cursor: pointer;
            transition: box-shadow 0.2s, transform 0.15s, background 0.2s, opacity 0.15s;
            user-select: none; -webkit-touch-callout: none;
            touch-action: manipulation;
        }
        .copy-box:active { transform: scale(0.98); background: #f0f4ff; }
        .copy-box .text {
            flex: 1; font-size: 16px; color: #222;
            word-break: break-all; line-height: 1.5;
        }
        .copy-box .badge {
            flex-shrink: 0; font-size: 13px; color: #fff;
            background: #4f8cf7; border-radius: 8px; padding: 6px 16px;
            transition: background 0.2s; font-weight: 500; min-width: 56px; text-align: center;
        }
        .copy-box.copied { background: #f0fff4; }
        .copy-box.copied .badge { background: #34c759; }

        .toast {
            position: fixed; bottom: calc(40px + env(safe-area-inset-bottom));
            left: 50%; transform: translateX(-50%) translateY(20px);
            background: rgba(0,0,0,0.78); color: #fff; font-size: 14px;
            padding: 12px 24px; border-radius: 10px; opacity: 0;
            pointer-events: none; transition: opacity 0.3s, transform 0.3s;
            white-space: nowrap; max-width: 90vw; overflow: hidden;
            text-overflow: ellipsis; z-index: 100;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ---- 添加区域 ---- */
        .add-area {
            margin-top: 8px;
            width: 100%; max-width: 600px;
            position: sticky; bottom: calc(env(safe-area-inset-bottom));
            padding-bottom: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .add-row { display: flex; gap: 8px; }
        .add-row input {
            flex: 1; padding: 14px 16px; border: 1.5px solid #ddd;
            border-radius: 10px; font-size: 16px; outline: none;
            background: #fff; transition: border-color 0.2s;
        }
        .add-row input:focus { border-color: #4f8cf7; }
        .add-row button {
            padding: 14px 24px; border: none; border-radius: 10px;
            background: #4f8cf7; color: #fff; font-size: 16px;
            font-weight: 500; cursor: pointer; transition: background 0.2s;
            -webkit-touch-callout: none; white-space: nowrap;
        }
        .add-row button:active { background: #3a7be5; }
        .cat-input {
            padding: 10px 14px; border: 1.5px solid #ddd;
            border-radius: 10px; font-size: 14px; outline: none;
            background: #fff; transition: border-color 0.2s;
            width: 100%;
        }
        .cat-input:focus { border-color: #4f8cf7; }
        .cat-input::placeholder { color: #bbb; }
        .empty-tip { color: #bbb; font-size: 14px; margin-top: 40px; }

        /* ---- 弹窗通用 ---- */
        .modal-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 200;
            align-items: center; justify-content: center;
            padding: 32px;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: #fff; border-radius: 16px;
            padding: 28px 24px 20px;
            width: 100%; max-width: 320px;
            text-align: center;
        }
        .modal-box .modal-text-preview {
            font-size: 14px; color: #666;
            background: #f5f5f5; border-radius: 8px;
            padding: 10px 14px; margin-bottom: 20px;
            word-break: break-all; text-align: left;
            max-height: 80px; overflow-y: auto;
        }
        .modal-btns { display: flex; gap: 12px; }
        .modal-btns button {
            flex: 1; padding: 12px 0; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 500; cursor: pointer;
            transition: opacity 0.2s;
        }
        .modal-btns button:active { opacity: 0.7; }
        .btn-cancel { background: #f0f0f0; color: #666; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-primary { background: #4f8cf7; color: #fff; }

        /* ---- 操作菜单 ---- */
        .action-box { padding: 8px 0; text-align: left; }
        .action-box .preview {
            font-size: 14px; color: #333; background: #f5f5f5;
            border-radius: 8px; padding: 10px 14px;
            word-break: break-all; margin-bottom: 20px;
            max-height: 80px; overflow-y: auto;
        }
        .action-btn {
            width: 100%; padding: 14px 0; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 500; cursor: pointer;
            margin-bottom: 8px; transition: opacity 0.2s;
        }
        .action-btn:active { opacity: 0.7; }
        .action-btn.edit { background: #e8f0fe; color: #4f8cf7; }
        .action-btn.delete { background: #fee8e8; color: #e74c3c; }

        /* ---- 编辑弹窗 ---- */
        .edit-field {
            width: 100%; padding: 12px 14px; border: 1.5px solid #ddd;
            border-radius: 10px; font-size: 15px; outline: none;
            background: #fff; transition: border-color 0.2s;
            margin-bottom: 12px;
        }
        .edit-field:focus { border-color: #4f8cf7; }
        .edit-field.textarea {
            min-height: 80px; resize: vertical;
            font-family: inherit; line-height: 1.5;
        }

        /* ---- 标题菜单（长按标题弹出） ---- */
        .header-menu-trigger {
            touch-action: manipulation;
            user-select: none;
            -webkit-touch-callout: none;
        }
        .header-btn {
            width: 100%; padding: 16px 0; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 500; cursor: pointer;
            margin-bottom: 8px; transition: opacity 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .header-btn:active { opacity: 0.7; }
        .header-btn.export { background: #e8f5e9; color: #2e7d32; }
        .header-btn.import { background: #e3f2fd; color: #1565c0; }
    </style>
</head>
<body>

    <!-- 标题区域（长按弹出菜单） -->
    <div class="header-area header-menu-trigger" id="headerArea">
        <h1>📋 云剪贴板</h1>
        <p class="subtitle">双击复制 · 长按更多操作</p>
        <div class="sync-status" id="syncStatus">🟢 已连接</div>
    </div>

    <div id="list"></div>
    <p class="empty-tip" id="emptyTip">还没有内容，在下方添加</p>

    <div class="add-area">
        <div class="add-row">
            <input id="newInput" placeholder="输入要添加的文本…" />
            <button onclick="addItem()">添加</button>
        </div>
        <input class="cat-input" id="catInput" placeholder="分组（留空则归为"通用"）" />
    </div>

    <div class="toast" id="toast"></div>

    <!-- 隐藏的文件选择器（导入用） -->
    <input type="file" id="csvFileInput" accept=".csv" style="display:none" />

    <!-- 标题菜单（长按标题弹出） -->
    <div class="modal-overlay" id="headerMenuModal">
        <div class="modal-box">
            <p style="font-size:16px;font-weight:600;margin-bottom:20px">📋 设置</p>
            <button class="header-btn export" onclick="exportCSV()">📥 导出 CSV</button>
            <button class="header-btn import" onclick="triggerImport()">📤 导入 CSV</button>
            <button class="action-btn" style="background:#f5f5f5;color:#666;margin-top:8px;margin-bottom:0" onclick="closeHeaderMenu()">取消</button>
        </div>
    </div>

    <!-- 导入确认弹窗 -->
    <div class="modal-overlay" id="importModal">
        <div class="modal-box">
            <p style="font-size:16px;font-weight:600;margin-bottom:12px">📤 导入数据</p>
            <p style="font-size:13px;color:#666;margin-bottom:16px;line-height:1.5">共读取到 <strong id="importCount">0</strong> 条数据</p>
            <div class="modal-text-preview" id="importPreview" style="max-height:120px;font-size:12px"></div>
            <p style="font-size:12px;color:#999;margin:12px 0 16px;line-height:1.4">
                <strong>追加</strong>：保留现有数据，新增导入的内容<br />
                <strong>覆盖</strong>：清空所有现有数据，只保留导入的内容
            </p>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeImportModal()">取消</button>
                <button class="btn-primary" onclick="confirmImport(true)" style="background:#34c759">追加</button>
                <button class="btn-danger" onclick="confirmImport(false)">覆盖</button>
            </div>
        </div>
    </div>

    <!-- 操作菜单弹窗（长按卡片弹出） -->
    <div class="modal-overlay" id="actionModal">
        <div class="modal-box">
            <div class="action-box">
                <div class="preview" id="actionPreview"></div>
                <button class="action-btn edit" onclick="showEditModal()">✏️ 修改</button>
                <button class="action-btn delete" onclick="showDeleteModal()">🗑 删除</button>
                <button class="action-btn" style="background:#f5f5f5;color:#666;margin-bottom:0" onclick="closeActionModal()">取消</button>
            </div>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-box" style="text-align:left">
            <p style="font-size:16px;font-weight:600;margin-bottom:16px;text-align:center">✏️ 修改内容</p>
            <textarea class="edit-field textarea" id="editTextInput" placeholder="文本内容"></textarea>
            <input class="edit-field" id="editCatInput" placeholder="分组" />
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeEditModal()">取消</button>
                <button class="btn-primary" onclick="confirmEdit()">保存</button>
            </div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-box">
            <p>确认删除？</p>
            <div class="modal-text-preview" id="deletePreview"></div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeDeleteModal()">取消</button>
                <button class="btn-danger" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>

    <script>
        // ============ Firebase 配置 ============
        const firebaseConfig = {
            apiKey: "AIzaSyAP9lpzll2dwrb8lP-QDG6HtzIUmqht11g",
            authDomain: "copy-3c2be.firebaseapp.com",
            databaseURL: "https://copy-3c2be-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "copy-3c2be",
            storageBucket: "copy-3c2be.firebasestorage.app",
            messagingSenderId: "650077116381",
            appId: "1:650077116381:web:1b6cf9cfe41235483f8834",
            measurementId: "G-J574GLH0WC"
        };
        // ======================================

        const COLORS = ['#4f8cf7','#34c759','#ff9500','#af52de','#ff3b30','#00c7be','#ff6482','#5856d6'];

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const itemsRef = db.ref('items');

        let items = [];
        let activeItemId = null;

        // ---- 实时监听 ----
        itemsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                items = Object.entries(data).map(([id, val]) => {
                    if (typeof val === 'string') return { id, text: val, category: '通用' };
                    return { id, text: val.text || '', category: val.category || '通用' };
                });
            } else { items = []; }
            render();
            updateSyncStatus(true);
        }, () => updateSyncStatus(false));

        function updateSyncStatus(online) {
            const el = document.getElementById('syncStatus');
            el.textContent = online ? '🟢 已连接 · 实时同步中' : '🔴 连接断开，请检查网络';
            el.className = 'sync-status' + (online ? '' : ' offline');
        }

        function getCatColor(cat) {
            let hash = 0;
            for (let i = 0; i < cat.length; i++) hash = ((hash << 5) - hash) + cat.charCodeAt(i);
            return COLORS[Math.abs(hash) % COLORS.length];
        }

        function findItemById(id) { return items.find(i => i.id === id); }

        // ---- 渲染 ----
        function render() {
            const listEl = document.getElementById('list');
            const emptyTip = document.getElementById('emptyTip');

            if (items.length === 0) {
                listEl.innerHTML = '';
                emptyTip.style.display = 'block';
                return;
            }
            emptyTip.style.display = 'none';

            const grouped = {};
            const catOrder = [];
            items.forEach(item => {
                const cat = item.category || '通用';
                if (!grouped[cat]) { grouped[cat] = []; catOrder.push(cat); }
                grouped[cat].push(item);
            });

            let html = '';
            catOrder.forEach(cat => {
                const color = getCatColor(cat);
                html += `<div class="group-header"><span style="color:${color}">●</span> ${cat} <span style="color:#ccc;font-weight:400;font-size:12px">${grouped[cat].length}</span></div>`;
                grouped[cat].forEach(item => {
                    html += `
                        <div class="copy-box" data-id="${item.id}">
                            <span class="text">${escapeHtml(item.text)}</span>
                            <span class="badge" onclick="event.stopPropagation();copyItem('${item.id}')">复制</span>
                        </div>
                    `;
                });
            });

            listEl.innerHTML = html;

            // ---- 卡片交互 ----
            listEl.querySelectorAll('.copy-box').forEach((box) => {
                const id = box.dataset.id;
                let lastClickTime = 0;
                let longPressTimer = null;
                let isLongPress = false;

                const startPress = () => {
                    isLongPress = false;
                    longPressTimer = setTimeout(() => {
                        isLongPress = true;
                        if (navigator.vibrate) navigator.vibrate(20);
                        showActionModal(id);
                    }, 600);
                };
                const endPress = () => {
                    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
                };
                const onClick = () => {
                    if (isLongPress) { isLongPress = false; return; }
                    const now = Date.now();
                    if (now - lastClickTime < 350) {
                        copyItem(id);
                        lastClickTime = 0;
                    } else {
                        lastClickTime = now;
                    }
                };

                box.addEventListener('touchstart', startPress, { passive: true });
                box.addEventListener('touchend', () => { endPress(); if (!isLongPress) onClick(); });
                box.addEventListener('touchmove', () => { if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; } });

                box.addEventListener('mousedown', startPress);
                box.addEventListener('mouseup', () => { endPress(); if (!isLongPress) onClick(); });
                box.addEventListener('mouseleave', () => { if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; } });
            });
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str; return d.innerHTML;
        }

        // ---- 复制 ----
        async function copyItem(id) {
            const item = findItemById(id);
            if (!item) return;
            try { await navigator.clipboard.writeText(item.text); }
            catch {
                const ta = document.createElement('textarea');
                ta.value = item.text;
                ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
                document.body.appendChild(ta);
                ta.focus(); ta.select(); document.execCommand('copy');
                document.body.removeChild(ta);
            }
            const box = document.querySelector(`.copy-box[data-id="${id}"]`);
            if (box) {
                box.classList.add('copied');
                const badge = box.querySelector('.badge');
                if (badge) badge.textContent = '已复制 ✓';
                setTimeout(() => {
                    box.classList.remove('copied');
                    if (badge) badge.textContent = '复制';
                }, 1200);
            }
            showToast(item.text.length > 28 ? item.text.slice(0, 28) + '…' : item.text);
        }

        // ---- 添加 ----
        function addItem() {
            const input = document.getElementById('newInput');
            const catInput = document.getElementById('catInput');
            const val = input.value.trim();
            const cat = catInput.value.trim() || '通用';
            if (!val) return;
            itemsRef.push({ text: val, category: cat }, (error) => {
                if (error) showToast('同步失败，请重试');
                else { input.value = ''; catInput.value = ''; }
            });
        }

        // ===== 标题长按菜单 =====
        let headerLongPressTimer = null;
        let isHeaderLongPress = false;

        document.getElementById('headerArea').addEventListener('touchstart', () => {
            isHeaderLongPress = false;
            headerLongPressTimer = setTimeout(() => {
                isHeaderLongPress = true;
                if (navigator.vibrate) navigator.vibrate(20);
                document.getElementById('headerMenuModal').classList.add('show');
            }, 600);
        }, { passive: true });

        document.getElementById('headerArea').addEventListener('touchend', () => {
            if (headerLongPressTimer) { clearTimeout(headerLongPressTimer); headerLongPressTimer = null; }
        });

        document.getElementById('headerArea').addEventListener('touchmove', () => {
            if (headerLongPressTimer) { clearTimeout(headerLongPressTimer); headerLongPressTimer = null; }
        });

        document.getElementById('headerArea').addEventListener('mousedown', () => {
            isHeaderLongPress = false;
            headerLongPressTimer = setTimeout(() => {
                isHeaderLongPress = true;
                if (navigator.vibrate) navigator.vibrate(20);
                document.getElementById('headerMenuModal').classList.add('show');
            }, 600);
        });

        document.getElementById('headerArea').addEventListener('mouseup', () => {
            if (headerLongPressTimer) { clearTimeout(headerLongPressTimer); headerLongPressTimer = null; }
        });

        document.getElementById('headerArea').addEventListener('mouseleave', () => {
            if (headerLongPressTimer) { clearTimeout(headerLongPressTimer); headerLongPressTimer = null; }
        });

        function closeHeaderMenu() {
            document.getElementById('headerMenuModal').classList.remove('show');
        }

        // 点击遮罩关闭
        document.getElementById('headerMenuModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeHeaderMenu();
        });

        // ===== CSV 导入 =====
        let parsedImportData = [];

        function triggerImport() {
            closeHeaderMenu();
            // 触发隐藏的文件选择器
            document.getElementById('csvFileInput').click();
        }

        // 监听文件选择
        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 用 ArrayBuffer 读取，手动尝试 UTF-8 和 GBK
            const reader = new FileReader();
            reader.onload = function(event) {
                const arrayBuffer = event.target.result;

                // 1. 尝试 UTF-8 解码（默认会去掉 BOM）
                const utf8Result = new TextDecoder('utf-8').decode(arrayBuffer);
                const utf8FirstLine = utf8Result.split('\n')[0].trim().toLowerCase();

                let content = utf8Result;

                // 2. 如果第一行没有 "text" 列名，说明可能是 GBK 编码，尝试 GBK
                if (!utf8FirstLine.includes('text')) {
                    try {
                        const gbkResult = new TextDecoder('gbk').decode(arrayBuffer);
                        const gbkFirstLine = gbkResult.split('\n')[0].trim().toLowerCase();
                        if (gbkFirstLine.includes('text')) {
                            content = gbkResult;
                        }
                    } catch (e) {
                        // TextDecoder('gbk') 不支持时回退到 UTF-8
                    }
                }

                parseCSVContent(content);
                document.getElementById('csvFileInput').value = '';
            };
            reader.readAsArrayBuffer(file);
        });

        function parseCSVContent(content) {
            // 按行拆分，但正确处理引号内的换行
            const lines = [];
            let currentLine = '';
            let inQuotes = false;
            for (let i = 0; i < content.length; i++) {
                const ch = content[i];
                if (ch === '"') {
                    inQuotes = !inQuotes;
                    currentLine += ch;
                } else if (ch === '\n' || (ch === '\r' && content[i+1] === '\n')) {
                    if (!inQuotes) {
                        if (currentLine.trim()) lines.push(currentLine.trim());
                        currentLine = '';
                        if (ch === '\r') i++; // 跳过 \r
                    } else {
                        currentLine += ch;
                    }
                } else if (ch === '\r') {
                    if (!inQuotes) {
                        if (currentLine.trim()) lines.push(currentLine.trim());
                        currentLine = '';
                    } else {
                        currentLine += ch;
                    }
                } else {
                    currentLine += ch;
                }
            }
            if (currentLine.trim()) lines.push(currentLine.trim());
            if (lines.length < 2) {
                showToast('CSV 文件为空或格式不正确');
                return;
            }

            // 解析表头，找到 text 和 category 的列索引
            const header = parseCSVLine(lines[0]);
            // 去掉 BOM 字符（\uFEFF）
            const textIdx = header.findIndex(h => h.replace(/^\uFEFF/, '').trim().toLowerCase() === 'text');
            const catIdx = header.findIndex(h => h.replace(/^\uFEFF/, '').trim().toLowerCase() === 'category');

            if (textIdx === -1) {
                showToast('CSV 文件缺少 "text" 列');
                return;
            }

            // 解析数据行
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const cols = parseCSVLine(lines[i]);
                const text = (cols[textIdx] || '').trim();
                if (!text) continue; // 跳过空行

                let category = '通用';
                if (catIdx !== -1 && cols[catIdx]) {
                    category = cols[catIdx].trim() || '通用';
                }
                data.push({ text, category });
            }

            if (data.length === 0) {
                showToast('未能解析到有效数据');
                return;
            }

            parsedImportData = data;
            document.getElementById('importCount').textContent = data.length;

            // 预览：显示前5条
            const previewLines = data.slice(0, 5).map(d => `${d.text}（${d.category}）`);
            const previewEl = document.getElementById('importPreview');
            previewEl.textContent = previewLines.join('\n');
            if (data.length > 5) {
                previewEl.textContent += `\n... 共 ${data.length} 条`;
            }

            document.getElementById('importModal').classList.add('show');
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (inQuotes) {
                    if (ch === '"') {
                        // 两个双引号表示一个转义的双引号
                        if (i + 1 < line.length && line[i + 1] === '"') {
                            current += '"';
                            i++;
                        } else {
                            inQuotes = false;
                        }
                    } else {
                        current += ch;
                    }
                } else {
                    if (ch === '"') {
                        inQuotes = true;
                    } else if (ch === ',') {
                        result.push(current);
                        current = '';
                    } else {
                        current += ch;
                    }
                }
            }
            result.push(current);
            return result;
        }

        function closeImportModal() {
            parsedImportData = [];
            document.getElementById('importModal').classList.remove('show');
        }

        function confirmImport(append) {
            if (parsedImportData.length === 0) return;
            const data = parsedImportData.slice(); // 先保存副本
            closeImportModal();

            if (append) {
                let completed = 0;
                data.forEach((item) => {
                    itemsRef.push({ text: item.text, category: item.category }, () => {
                        completed++;
                        if (completed === data.length) {
                            showToast(`已追加导入 ${data.length} 条数据`);
                        }
                    });
                });
            } else {
                itemsRef.remove(() => {
                    let completed = 0;
                    data.forEach((item) => {
                        itemsRef.push({ text: item.text, category: item.category }, () => {
                            completed++;
                            if (completed === data.length) {
                                showToast(`已覆盖导入 ${data.length} 条数据`);
                            }
                        });
                    });
                });
            }
        }

        // ===== CSV 导出 =====
        function escapeCSV(str) {
            if (str == null) return '';
            const s = String(str);
            // 如果包含逗号、双引号、换行，需要用双引号包裹
            if (s.includes(',') || s.includes('"') || s.includes('\n') || s.includes('\r')) {
                return '"' + s.replace(/"/g, '""') + '"';
            }
            return s;
        }

        function exportCSV() {
            if (items.length === 0) {
                showToast('没有数据可导出');
                closeHeaderMenu();
                return;
            }

            // 表头
            const rows = ['text,category'];
            // 数据行
            items.forEach(item => {
                rows.push(`${escapeCSV(item.text)},${escapeCSV(item.category)}`);
            });

            // 加 BOM (EF BB BF)，Excel 打开中文不乱码
            const bom = '\uFEFF';
            const csvContent = bom + rows.join('\n');

            // 创建 Blob 并下载
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            const now = new Date();
            const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            a.download = `云剪贴板_${dateStr}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showToast(`已导出 ${items.length} 条数据`);
            closeHeaderMenu();
        }

        // ===== 长按卡片操作菜单 =====
        function showActionModal(id) {
            activeItemId = id;
            const item = findItemById(id);
            if (!item) return;
            document.getElementById('actionPreview').textContent = item.text;
            document.getElementById('actionModal').classList.add('show');
        }

        function closeActionModal() {
            activeItemId = null;
            document.getElementById('actionModal').classList.remove('show');
        }

        // ===== 编辑 =====
        function showEditModal() {
            const id = activeItemId;
            closeActionModal();
            const item = findItemById(id);
            if (!item) return;
            activeItemId = id;
            document.getElementById('editTextInput').value = item.text;
            document.getElementById('editCatInput').value = item.category;
            document.getElementById('editModal').classList.add('show');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
        }

        function confirmEdit() {
            const text = document.getElementById('editTextInput').value.trim();
            const cat = document.getElementById('editCatInput').value.trim() || '通用';
            if (!text || !activeItemId) return;
            itemsRef.child(activeItemId).set({ text, category: cat }, (error) => {
                if (error) showToast('保存失败');
                else showToast('已修改');
            });
            closeEditModal();
        }

        // ===== 删除 =====
        function showDeleteModal() {
            closeActionModal();
            const item = findItemById(activeItemId);
            if (!item) return;
            document.getElementById('deletePreview').textContent = item.text;
            document.getElementById('deleteModal').classList.add('show');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('show');
        }

        function confirmDelete() {
            if (activeItemId) {
                itemsRef.child(activeItemId).remove();
                showToast('已删除');
            }
            closeDeleteModal();
        }

        // 点击遮罩关闭
        document.querySelectorAll('.modal-overlay').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target === e.currentTarget) {
                    el.classList.remove('show');
                    if (el.id === 'deleteModal' || el.id === 'editModal' || el.id === 'actionModal') activeItemId = null;
                    if (el.id === 'importModal') parsedImportData = [];
                }
            });
        });

        // ---- Toast ----
        let toastTimer = null;
        function showToast(msg) {
            const toastEl = document.getElementById('toast');
            if (toastTimer) clearTimeout(toastTimer);
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
        }

        // ---- 回车 ----
        document.getElementById('newInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') addItem(); });
        document.getElementById('catInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') addItem(); });
    </script>

</body>
</html>
